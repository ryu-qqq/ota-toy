server:
  port: 0

spring:
  application:
    name: ota-extranet-test

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  data:
    redis:
      host: localhost
      port: 6379

rate-cache:
  key-prefix: "rate:"
  ttl: PT1H

springdoc:
  api-docs:
    enabled: false
