server:
  port: 8081

spring:
  application:
    name: ota-customer

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  config:
    import:
      - classpath:persistence.yml
      - optional:classpath:persistence-${spring.profiles.active:local}.yml
      - classpath:redis.yml
      - optional:classpath:redis-${spring.profiles.active:local}.yml

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
