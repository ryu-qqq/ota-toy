server:
  port: 8081

spring:
  application:
    name: ota-customer

  config:
    import:
      - classpath:persistence.yml
      - classpath:persistence-local.yml
      - classpath:redis.yml
      - classpath:redis-local.yml

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
