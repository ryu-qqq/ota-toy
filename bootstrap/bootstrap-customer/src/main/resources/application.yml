server:
  port: 8081

spring:
  application:
    name: ota-customer

  config:
    import:
      - classpath:persistence.yml
      - classpath:persistence-local.yml
      - classpath:redis.yml
      - classpath:redis-local.yml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
